<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volvo Visual Stats - Live Preview</title>
  <script type="module" src="../dist/volvo-visual-stats.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    h1 { color: white; font-size: 22px; font-weight: 600; }
    .hint { color: #777; font-size: 12px; }
    .hint code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-family: monospace; }

    .main { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

    volvo-visual-stats {
      display: block; width: 260px;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* State panel */
    .state-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      min-width: 210px;
    }
    .group-header {
      font-size: 11px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.6px;
      padding: 8px 14px 4px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-row:hover { background: rgba(255,255,255,0.06); }
    .toggle-label { font-size: 13px; color: #ccc; }
    .toggle-pill {
      font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 12px;
      background: rgba(255,255,255,0.08); color: #555;
      transition: all 0.15s;
    }
    .toggle-row.on-window .toggle-label,
    .toggle-row.on-door   .toggle-label { color: #ffb74d; }
    .toggle-row.on-window .toggle-pill,
    .toggle-row.on-door   .toggle-pill  { background: rgba(255,152,0,0.3); color: #ff9800; }
    .toggle-row.on-climate .toggle-label { color: #90caf9; }
    .toggle-row.on-climate .toggle-pill  { background: rgba(122,181,207,0.3); color: #7ab5cf; }
    .toggle-row.on-charge .toggle-label { color: #69f0ae; }
    .toggle-row.on-charge .toggle-pill  { background: rgba(0,255,0,0.2); color: #00e676; }
    .toggle-row.on-tire .toggle-label { color: #ff8a80; }
    .toggle-row.on-tire .toggle-pill  { background: rgba(255,68,68,0.25); color: #ff4444; }
  </style>
</head>
<body>
  <h1>🚗 Volvo Visual Stats</h1>
  <p class="hint">Run <code>npm run watch</code> · click rows to toggle states</p>

  <div class="main">
    <volvo-visual-stats id="card"></volvo-visual-stats>

    <div class="state-panel" id="state-panel"></div>
  </div>

  <script>
    // entity-id -> { label, type, chargingValue }
    const ENTITY_GROUPS = [
      {
        label: '🪟 Windows',
        items: [
          { id: 'binary_sensor.volvo_xc40_window_front_left_open',  label: 'Front Left',  type: 'window' },
          { id: 'binary_sensor.volvo_xc40_window_front_right_open', label: 'Front Right', type: 'window' },
          { id: 'binary_sensor.volvo_xc40_window_back_left_open',   label: 'Rear Left',   type: 'window' },
          { id: 'binary_sensor.volvo_xc40_window_back_right_open',  label: 'Rear Right',  type: 'window' },
        ]
      },
      {
        label: '🚪 Doors',
        items: [
          { id: 'binary_sensor.volvo_xc40_door_front_left_open',  label: 'Front Left',  type: 'door' },
          { id: 'binary_sensor.volvo_xc40_door_front_right_open', label: 'Front Right', type: 'door' },
          { id: 'binary_sensor.volvo_xc40_door_back_left_open',   label: 'Rear Left',   type: 'door' },
          { id: 'binary_sensor.volvo_xc40_door_back_right_open',  label: 'Rear Right',  type: 'door' },
          { id: 'binary_sensor.volvo_xc40_trunk_open',            label: 'Trunk',       type: 'door' },
        ]
      },
      {
        label: '⚠️ Tires',
        items: [
          { id: 'sensor.volvo_xc40_tire_pressure_front_left_warning',  label: 'Front Left',  type: 'tire' },
          { id: 'sensor.volvo_xc40_tire_pressure_front_right_warning', label: 'Front Right', type: 'tire' },
          { id: 'sensor.volvo_xc40_tire_pressure_back_left_warning',   label: 'Rear Left',   type: 'tire' },
          { id: 'sensor.volvo_xc40_tire_pressure_back_right_warning',  label: 'Rear Right',  type: 'tire' },
        ]
      },
      {
        label: '⚡ Other',
        items: [
          { id: 'binary_sensor.volvo_xc40_climate_active', label: 'Climate',  type: 'climate' },
          { id: 'sensor.volvo_xc40_charging_status',       label: 'Charging', type: 'charge', onValue: 'charging' },
        ]
      },
    ];

    // Live entity states
    const liveStates = {};

    function isOn(id, onValue = 'on') {
      return liveStates[id] && liveStates[id].state === onValue;
    }

    function buildHass() {
      const states = {};
      for (const group of ENTITY_GROUPS) {
        for (const item of group.items) {
          states[item.id] = liveStates[item.id] || { state: 'off' };
        }
      }
      return { states };
    }

    function pillText(item) {
      const on = isOn(item.id, item.onValue || 'on');
      if (!on) return 'off';
      if (item.type === 'window' || item.type === 'door') return 'open';
      if (item.type === 'climate') return 'active';
      if (item.type === 'charge') return 'charging';
      if (item.type === 'tire') return 'warning';
      return 'on';
    }

    function render() {
      const panel = document.getElementById('state-panel');
      let html = '';
      for (const group of ENTITY_GROUPS) {
        html += `<div class="group-header">${group.label}</div>`;
        for (const item of group.items) {
          const on = isOn(item.id, item.onValue || 'on');
          const cls = on ? ` on-${item.type}` : '';
          html += `<div class="toggle-row${cls}" data-id="${item.id}" data-type="${item.type}" data-on-value="${item.onValue || 'on'}">
            <span class="toggle-label">${item.label}</span>
            <span class="toggle-pill">${pillText(item)}</span>
          </div>`;
        }
      }
      panel.innerHTML = html;
      document.getElementById('card').hass = buildHass();
    }

    document.getElementById('state-panel').addEventListener('click', e => {
      const row = e.target.closest('[data-id]');
      if (!row) return;
      const id = row.dataset.id;
      const onValue = row.dataset.onValue;
      if (liveStates[id] && liveStates[id].state === onValue) {
        liveStates[id] = { state: 'off' };
      } else {
        liveStates[id] = { state: onValue };
      }
      render();
    });

    customElements.whenDefined('volvo-visual-stats').then(() => {
      document.getElementById('card').setConfig({ id_prefix: 'volvo_xc40_', title: 'XC40' });
      render();
    });
  </script>
</body>
</html>
