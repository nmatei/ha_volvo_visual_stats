<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volvo Visual Stats - Card Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
      font-size: 32px;
    }

    .controls {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .scenario-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #667eea;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .scenario-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .scenario-btn.active {
      background: #764ba2;
      box-shadow: 0 4px 12px rgba(118, 75, 162, 0.4);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    ha-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .card-wrapper {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .card-header {
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-bottom: 1px solid #eee;
      background: #f5f5f5;
    }

    .card-content {
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }

    .car-container {
      width: 100%;
      max-width: 300px;
      aspect-ratio: 9 / 16;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .state-info {
      background: #f9f9f9;
      padding: 12px 16px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #666;
    }

    .state-info div {
      margin: 4px 0;
      display: flex;
      justify-content: space-between;
    }

    .state-label {
      font-weight: 600;
    }

    .state-value {
      color: #333;
    }

    .reset-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #f44336;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .reset-btn:hover {
      background: #da190b;
      transform: translateY(-2px);
    }

    .footer {
      color: white;
      text-align: center;
      font-size: 14px;
      padding: 20px;
    }

    @keyframes steam-rise {
      0% { transform: translateY(0px); opacity: 0.6; }
      50% { opacity: 0.4; }
      100% { transform: translateY(-20px); opacity: 0; }
    }
    
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px); }
      50% { filter: drop-shadow(0 0 8px); }
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .steam-particle {
      animation: steam-rise 2s infinite ease-out;
    }
    
    .glow {
      animation: glow-pulse 1.5s infinite;
    }
    
    .rotating {
      animation: rotate 20s linear infinite;
      transform-origin: center;
    }
  </style>
</head>

      <button class="scenario-btn" onclick="setScenario('all-active')">All Active</button>
      <button class="reset-btn" onclick="setScenario('default')">Reset</button>

    <div class="cards-grid">

        <div class="state-info" id="state-info"></div>

    <div class="footer">
      <p>This is a preview of the Volvo Visual Stats card. Click the scenario buttons to see different states.</p>

          <circle cx="42" cy="250" r="3" fill="#555" />
          <circle cx="158" cy="250" r="3" fill="#555" />

        front_left: { cx: 35, cy: 60 },
        front_right: { cx: 165, cy: 60 },
        back_left: { cx: 35, cy: 240 },
        back_right: { cx: 165, cy: 240 },
      };

      if (carState.tire_pressure.front_left_warning) {
        const pos = WHEEL_POSITIONS.front_left;
        tireOverlay += `
          <circle cx="${pos.cx}" cy="${pos.cy}" r="8" fill="none" stroke="#ff0000" stroke-width="2" opacity="0.8" class="glow" />
          <circle cx="${pos.cx}" cy="${pos.cy}" r="6" fill="#ff0000" opacity="0.6" />
          <text x="${pos.cx}" y="${pos.cy + 2}" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="bold">!</text>
        `;
      }
      if (carState.tire_pressure.front_right_warning) {
        const pos = WHEEL_POSITIONS.front_right;
        tireOverlay += `
          <circle cx="${pos.cx}" cy="${pos.cy}" r="8" fill="none" stroke="#ff0000" stroke-width="2" opacity="0.8" class="glow" />
          <circle cx="${pos.cx}" cy="${pos.cy}" r="6" fill="#ff0000" opacity="0.6" />
          <text x="${pos.cx}" y="${pos.cy + 2}" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="bold">!</text>
        `;
      }

      return `
        <svg viewBox="0 0 ${SVG_WIDTH} ${SVG_HEIGHT}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid meet">
          <defs>
            <style>
              @keyframes steam-rise {
                0% { transform: translateY(0px); opacity: 0.6; }
                50% { opacity: 0.4; }
                100% { transform: translateY(-20px); opacity: 0; }
              }
              @keyframes glow-pulse {
                0%, 100% { filter: drop-shadow(0 0 4px); }
                50% { filter: drop-shadow(0 0 8px); }
              }
              .steam-particle {
                animation: steam-rise 2s infinite ease-out;
              }
              .glow {
                animation: glow-pulse 1.5s infinite;
              }
            </style>
          </defs>
          
          <!-- Car body -->
          ${carSvg}
          
          <!-- Overlays -->
          ${windowsOverlay}
          ${climateOverlay}
          ${chargingOverlay}
          ${tireOverlay}
        </svg>
      `;
    }

    function updateStateInfo(carState) {
      const info = `
        <div><span class="state-label">Windows FL:</span> <span class="state-value">${carState.windows_doors.window_front_left ? '🟠 OPEN' : '✓ Closed'}</span></div>
        <div><span class="state-label">Windows FR:</span> <span class="state-value">${carState.windows_doors.window_front_right ? '🟠 OPEN' : '✓ Closed'}</span></div>
        <div><span class="state-label">Climate:</span> <span class="state-value">${carState.climate.active ? '❄️ ACTIVE' : '✓ Off'}</span></div>
        <div><span class="state-label">Charging:</span> <span class="state-value">${carState.charging.isCharging ? '🔌 CHARGING' : '✓ Idle'}</span></div>
        <div><span class="state-label">Tire Warning FL:</span> <span class="state-value">${carState.tire_pressure.front_left_warning ? '⚠️ WARNING' : '✓ OK'}</span></div>
      `;
      document.getElementById('state-info').innerHTML = info;
    }

    // Initial render
    renderCard();
  </script>
</body>
</html>
